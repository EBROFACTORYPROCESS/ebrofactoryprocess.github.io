<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPO - Business Process Orchestrator</title>
    <!-- Force reload styles -->
    <link rel="stylesheet" href="style.css?v=1">
    <style>
        /* Loading indicator styles */
        #app-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 1.2rem;
            color: #1e3c72;
            flex-direction: column;
            gap: 1rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #2a5298;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading indicator -->
    <div id="app-loading">
        <div class="spinner"></div>
        <div>⏳ Loading latest data...</div>
        <div style="font-size:0.8rem;color:#94a3b8;">The first load might take a few seconds</div>
    </div>

    <!-- Main app container -->
    <div id="app-root" style="display:none;"></div>

    <!-- ============================================================
         CDN Libraries - Load BEFORE app.js
         ============================================================ -->
    <!-- LZString for compression -->
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/lz-string.min.js"></script>
    <!-- jsondiffpatch for diff generation (only loaded once) -->
    <script src="https://cdn.jsdelivr.net/npm/jsondiffpatch@0.6.0/dist/jsondiffpatch.umd.min.js"></script>

    <!-- ============================================================
         Configuration & Core Logic - Load AFTER CDN libraries
         ============================================================ -->
    <!-- Optional: config.js (if you have it) -->
    <script src="config.js?v=1"></script>
    <!-- Core application logic -->
    <script src="app.js?v=1"></script>
</body>
</html>
