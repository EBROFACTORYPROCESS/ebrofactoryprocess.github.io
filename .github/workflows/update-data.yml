name: Update data.json from web

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install lz-string
        run: npm install lz-string

      - name: Write payload to file
        run: |
          cat > payload.json << 'EOF'
          ${{ toJSON(github.event.client_payload) }}
          EOF

      - name: Process payload (single or chunked)
        run: |
          node -e "
            const fs = require('fs');
            const LZString = require('lz-string');
            
            console.log('=== Starting apply changes ===');
            
            // Read current data.json
            let currentData = {};
            try {
              const content = fs.readFileSync('data.json', 'utf8');
              currentData = JSON.parse(content);
              console.log('Current data loaded, size:', Object.keys(currentData).length);
            } catch (e) {
              console.log('No existing data.json, creating new one');
            }
            
            // Read payload
            const payloadContent = fs.readFileSync('payload.json', 'utf8');
            console.log('Payload content length:', payloadContent.length);
            
            let payload;
            try {
              payload = JSON.parse(payloadContent);
              console.log('Payload parsed successfully');
              console.log('Payload keys:', Object.keys(payload));
            } catch (e) {
              console.error('Failed to parse payload.json:', e.message);
              process.exit(1);
            }
            
            const payloadType = payload.type || 'diff';
            const compression = payload.compression || 'none';
            let fullData = null;
            
            // ============================================================
            // CASE 1: Chunked payload - use Artifacts to share state
            // ============================================================
            if (payloadType === 'chunked') {
              const chunkIndex = payload.chunk_index || 0;
              const totalChunks = payload.total_chunks || 1;
              const chunkData = payload.chunk_data || '';
              
              console.log('Processing chunk', chunkIndex + 1, 'of', totalChunks);
              console.log('Chunk data length:', chunkData.length);
              
              // Read existing combined data from artifact (if any)
              let combinedData = '';
              const combinedFile = 'combined.json';
              if (fs.existsSync(combinedFile)) {
                combinedData = fs.readFileSync(combinedFile, 'utf8');
                console.log('Loaded existing combined data, length:', combinedData.length);
              }
              
              // Append new chunk
              if (chunkIndex === 0) {
                // First chunk - start fresh
                combinedData = chunkData;
              } else {
                // Append to existing - need to merge JSON properly
                if (combinedData) {
                  // Remove trailing '}' or ']' from existing
                  let trimmed = combinedData.trim();
                  if (trimmed.endsWith('}') || trimmed.endsWith(']')) {
                    const lastChar = trimmed.endsWith('}') ? '}' : ']';
                    const lastIndex = combinedData.lastIndexOf(lastChar);
                    if (lastIndex !== -1) {
                      combinedData = combinedData.substring(0, lastIndex);
                      // Add comma if needed
                      const chunkTrimmed = chunkData.trim();
                      if (chunkTrimmed.startsWith('{') || chunkTrimmed.startsWith('[')) {
                        combinedData += ',';
                      }
                      combinedData += chunkData;
                    } else {
                      combinedData += ',' + chunkData;
                    }
                  } else {
                    combinedData += ',' + chunkData;
                  }
                } else {
                  combinedData = chunkData;
                }
              }
              
              // Save combined data for next chunk
              fs.writeFileSync(combinedFile, combinedData);
              console.log('Updated combined data, length:', combinedData.length);
              
              // If this is the last chunk, process it
              if (chunkIndex === totalChunks - 1) {
                console.log('All chunks received, processing combined data...');
                let fullContent = combinedData;
                
                // Fix incomplete JSON if needed
                try {
                  JSON.parse(fullContent);
                } catch (e) {
                  console.log('Fixing incomplete JSON...');
                  const openBraces = (fullContent.match(/{/g) || []).length;
                  const closeBraces = (fullContent.match(/}/g) || []).length;
                  const openBrackets = (fullContent.match(/\[/g) || []).length;
                  const closeBrackets = (fullContent.match(/\]/g) || []).length;
                  
                  if (openBraces > closeBraces) {
                    fullContent += '}'.repeat(openBraces - closeBraces);
                  }
                  if (openBrackets > closeBrackets) {
                    fullContent += ']'.repeat(openBrackets - closeBrackets);
                  }
                }
                
                // Decompress if needed
                if (compression === 'lzstring') {
                  console.log('Decompressing combined data...');
                  const decompressed = LZString.decompressFromEncodedURIComponent(fullContent);
                  if (decompressed) {
                    fullContent = decompressed;
                    console.log('Decompressed successfully, length:', fullContent.length);
                  } else {
                    console.error('Failed to decompress combined data');
                    process.exit(1);
                  }
                }
                
                try {
                  fullData = JSON.parse(fullContent);
                  console.log('Combined data parsed successfully');
                } catch (e) {
                  console.error('Failed to parse combined data:', e.message);
                  console.log('Combined data preview:', fullContent.substring(0, 200));
                  process.exit(1);
                }
              } else {
                // Not the last chunk - save artifact for next run
                console.log('Chunk', chunkIndex + 1, 'of', totalChunks, 'received. Saving state for next chunk...');
                
                // Upload artifact for the next chunk
                const { execSync } = require('child_process');
                try {
                  execSync('mkdir -p .github/artifacts', { stdio: 'inherit' });
                  fs.copyFileSync('combined.json', '.github/artifacts/combined.json');
                  console.log('✅ Artifact saved for next chunk');
                } catch (e) {
                  console.log('Could not save artifact, will use local file if available');
                }
                
                console.log('Waiting for chunk', chunkIndex + 2, 'of', totalChunks);
                process.exit(0);
              }
            }
            
            // ============================================================
            // CASE 2: Single payload
            // ============================================================
            else {
              console.log('Processing single payload...');
              let payloadData = payload.data || '';
              
              if (compression === 'lzstring') {
                console.log('Decompressing lzstring data...');
                const decompressed = LZString.decompressFromEncodedURIComponent(payloadData);
                if (decompressed) {
                  payloadData = decompressed;
                  console.log('Decompressed successfully, length:', payloadData.length);
                } else {
                  console.error('Failed to decompress data');
                  process.exit(1);
                }
              }
              
              try {
                fullData = JSON.parse(payloadData);
                console.log('Payload parsed successfully');
              } catch (e) {
                console.error('Failed to parse payload data:', e.message);
                console.log('Payload data preview:', payloadData.substring(0, 200));
                process.exit(1);
              }
            }
            
            // ============================================================
            // Apply the changes
            // ============================================================
            if (fullData) {
              console.log('Applying changes...');
              let newData;
              
              function deepMerge(target, source) {
                for (const key in source) {
                  if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                    if (!target[key]) target[key] = {};
                    deepMerge(target[key], source[key]);
                  } else {
                    target[key] = source[key];
                  }
                }
                return target;
              }
              
              if (fullData._full || payload.type === 'full') {
                newData = fullData._full || fullData;
                console.log('Full data replacement');
              } else {
                newData = deepMerge(JSON.parse(JSON.stringify(currentData)), fullData);
                console.log('Deep merge applied');
              }
              
              fs.writeFileSync('data.json', JSON.stringify(newData, null, 2));
              console.log('✅ data.json updated successfully');
              
              // Clean up
              try { fs.unlinkSync('combined.json'); } catch(e) {}
              try { fs.rmSync('.github/artifacts', { recursive: true, force: true }); } catch(e) {}
            } else {
              console.log('Waiting for more chunks...');
            }
          "

      - name: Upload artifact for chunk state (if not complete)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chunk-state
          path: |
            combined.json
            .github/artifacts/
          retention-days: 1

      - name: Download artifact for chunk state (if exists)
        uses: actions/download-artifact@v4
        with:
          name: chunk-state
          path: .
        continue-on-error: true

      - name: Validate JSON
        run: |
          if [ -f data.json ] && [ -s data.json ]; then
            if ! jq empty data.json 2>/dev/null; then
              echo "❌ Invalid JSON in data.json"
              cat data.json | head -100
              exit 1
            fi
            echo "✅ JSON validation passed"
          fi

      - name: Commit and push
        run: |
          if [ -f data.json ] && git diff --quiet data.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Apply changes from web [skip ci]" || echo "No changes to commit"
            git push
          fi
