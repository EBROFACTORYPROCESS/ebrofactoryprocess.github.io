name: Update data.json from web

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install lz-string
        run: npm install lz-string

      - name: Write payload to file
        run: |
          cat > payload.json << 'EOF'
          ${{ toJSON(github.event.client_payload) }}
          EOF

      - name: Apply changes
        run: |
          node -e "
            const fs = require('fs');
            const LZString = require('lz-string');
            
            console.log('=== Starting apply changes ===');
            
            // Read current data.json
            let currentData = {};
            try {
              const content = fs.readFileSync('data.json', 'utf8');
              currentData = JSON.parse(content);
              console.log('Current data loaded, size:', Object.keys(currentData).length);
            } catch (e) {
              console.log('No existing data.json, creating new one');
            }
            
            // Read payload
            const payloadContent = fs.readFileSync('payload.json', 'utf8');
            console.log('Payload content length:', payloadContent.length);
            
            let payload;
            try {
              payload = JSON.parse(payloadContent);
              console.log('Payload parsed successfully');
              console.log('Payload keys:', Object.keys(payload));
            } catch (e) {
              console.error('Failed to parse payload.json:', e.message);
              process.exit(1);
            }
            
            let fullData = null;
            const payloadType = payload.type || 'diff';
            const compression = payload.compression || 'none';
            
            // ============================================================
            // CASE 1: Chunked payload (multiple chunks coming separately)
            // ============================================================
            if (payloadType === 'chunked') {
              const chunkIndex = payload.chunk_index || 0;
              const totalChunks = payload.total_chunks || 1;
              const chunkData = payload.chunk_data || '';
              
              console.log('Processing chunk', chunkIndex + 1, 'of', totalChunks);
              console.log('Chunk data length:', chunkData.length);
              
              // Write chunk to file
              const chunkFile = 'chunk_' + chunkIndex + '.json';
              fs.writeFileSync(chunkFile, chunkData);
              
              // Initialize or append to combined.json
              if (chunkIndex === 0) {
                fs.writeFileSync('combined.json', chunkData);
                console.log('Initialized combined.json with chunk 0');
              } else {
                // Check if combined.json exists
                if (!fs.existsSync('combined.json')) {
                  console.error('combined.json not found for chunk', chunkIndex);
                  process.exit(1);
                }
                
                const existing = fs.readFileSync('combined.json', 'utf8');
                
                // Combine: remove trailing '}' or ']' and append new chunk
                let combined = existing;
                const trimmedExisting = existing.trim();
                const trimmedChunk = chunkData.trim();
                
                if (trimmedExisting.endsWith('}') || trimmedExisting.endsWith(']')) {
                  // Find the last } or ] and remove it
                  const lastChar = trimmedExisting.endsWith('}') ? '}' : ']';
                  const lastIndex = combined.lastIndexOf(lastChar);
                  if (lastIndex !== -1) {
                    combined = combined.substring(0, lastIndex);
                    // Add comma if needed
                    if (trimmedChunk.startsWith('{') || trimmedChunk.startsWith('[')) {
                      combined += ',';
                    }
                    combined += chunkData;
                  } else {
                    combined += ',' + chunkData;
                  }
                } else {
                  combined += ',' + chunkData;
                }
                
                fs.writeFileSync('combined.json', combined);
                console.log('Appended chunk', chunkIndex, 'to combined.json');
              }
              
              // If this is the last chunk, process the combined data
              if (chunkIndex === totalChunks - 1) {
                console.log('All chunks received, processing combined data...');
                let combinedContent = fs.readFileSync('combined.json', 'utf8');
                
                // Fix incomplete JSON if needed
                try {
                  JSON.parse(combinedContent);
                } catch (e) {
                  console.log('Fixing incomplete JSON...');
                  const openBraces = (combinedContent.match(/{/g) || []).length;
                  const closeBraces = (combinedContent.match(/}/g) || []).length;
                  const openBrackets = (combinedContent.match(/\[/g) || []).length;
                  const closeBrackets = (combinedContent.match(/\]/g) || []).length;
                  
                  if (openBraces > closeBraces) {
                    combinedContent += '}'.repeat(openBraces - closeBraces);
                  }
                  if (openBrackets > closeBrackets) {
                    combinedContent += ']'.repeat(openBrackets - closeBrackets);
                  }
                }
                
                // Decompress if needed
                if (compression === 'lzstring') {
                  console.log('Decompressing combined data...');
                  const decompressed = LZString.decompressFromEncodedURIComponent(combinedContent);
                  if (decompressed) {
                    combinedContent = decompressed;
                    console.log('Decompressed successfully, length:', combinedContent.length);
                  } else {
                    console.error('Failed to decompress combined data');
                    process.exit(1);
                  }
                }
                
                try {
                  fullData = JSON.parse(combinedContent);
                  console.log('Combined data parsed successfully');
                } catch (e) {
                  console.error('Failed to parse combined data:', e.message);
                  console.log('Combined data preview:', combinedContent.substring(0, 200));
                  process.exit(1);
                }
              } else {
                // Not the last chunk - exit successfully
                console.log('Chunk', chunkIndex + 1, 'of', totalChunks, 'received, waiting for more...');
                process.exit(0);
              }
            }
            
            // ============================================================
            // CASE 2: Single payload (Plan B - direct data)
            // ============================================================
            else {
              console.log('Processing single payload...');
              let payloadData = payload.data || '';
              
              if (!payloadData && payload.diff) {
                payloadData = JSON.stringify(payload.diff);
              }
              
              console.log('Payload data length:', payloadData.length);
              
              if (compression === 'lzstring') {
                console.log('Decompressing lzstring data...');
                const decompressed = LZString.decompressFromEncodedURIComponent(payloadData);
                if (decompressed) {
                  payloadData = decompressed;
                  console.log('Decompressed successfully, length:', payloadData.length);
                } else {
                  console.error('Failed to decompress data');
                  process.exit(1);
                }
              }
              
              try {
                fullData = JSON.parse(payloadData);
                console.log('Payload parsed successfully');
              } catch (e) {
                console.error('Failed to parse payload data:', e.message);
                console.log('Payload data preview:', payloadData.substring(0, 200));
                process.exit(1);
              }
            }
            
            // ============================================================
            // Apply the changes
            // ============================================================
            if (fullData) {
              console.log('Applying changes...');
              let newData;
              
              function deepMerge(target, source) {
                for (const key in source) {
                  if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                    if (!target[key]) target[key] = {};
                    deepMerge(target[key], source[key]);
                  } else {
                    target[key] = source[key];
                  }
                }
                return target;
              }
              
              // If it's a full data replacement
              if (fullData._full || payload.type === 'full') {
                newData = fullData._full || fullData;
                console.log('Full data replacement');
              } else {
                newData = deepMerge(JSON.parse(JSON.stringify(currentData)), fullData);
                console.log('Deep merge applied');
              }
              
              fs.writeFileSync('data.json', JSON.stringify(newData, null, 2));
              console.log('✅ data.json updated successfully');
              
              // Clean up temp files
              try { fs.unlinkSync('combined.json'); } catch(e) {}
              try { 
                const files = fs.readdirSync('.');
                for (const file of files) {
                  if (file.startsWith('chunk_')) {
                    fs.unlinkSync(file);
                  }
                }
              } catch(e) {}
            } else {
              console.log('No data to apply');
            }
          "

      - name: Validate JSON
        run: |
          if [ -f data.json ] && [ -s data.json ]; then
            if ! jq empty data.json 2>/dev/null; then
              echo "❌ Invalid JSON in data.json"
              cat data.json | head -100
              exit 1
            fi
            echo "✅ JSON validation passed"
          fi

      - name: Commit and push
        run: |
          if [ -f data.json ] && git diff --quiet data.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Apply changes from web [skip ci]" || echo "No changes to commit"
            git push
          fi
