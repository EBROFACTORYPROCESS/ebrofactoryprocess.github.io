name: Update data.json from web

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install jsondiffpatch@0.4.1
          npm install diff

      - name: Write payload to file
        run: |
          cat > payload.json << 'EOF'
          ${{ toJSON(github.event.client_payload) }}
          EOF

      - name: Apply changes
        run: |
          node -e "
            const fs = require('fs');
            const jsondiffpatch = require('jsondiffpatch');
            
            console.log('=== Starting apply changes ===');
            
            // Read current data.json
            let currentData = {};
            try {
              const content = fs.readFileSync('data.json', 'utf8');
              currentData = JSON.parse(content);
              console.log('Current data loaded, scenarios:', currentData.scenarios?.length || 0);
            } catch (e) {
              console.log('No existing data.json, creating new one');
            }
            
            // Read payload
            const payloadContent = fs.readFileSync('payload.json', 'utf8');
            console.log('Payload content length:', payloadContent.length);
            
            let payload;
            try {
              payload = JSON.parse(payloadContent);
              console.log('Payload parsed successfully');
              console.log('Payload keys:', Object.keys(payload));
            } catch (e) {
              console.error('Failed to parse payload.json:', e.message);
              process.exit(1);
            }
            
            const payloadType = payload.type || 'diff';
            const gistId = payload.gist_id || '';
            let fullData = null;
            let diffData = null;
            
            console.log('Payload type:', payloadType);
            console.log('Gist ID:', gistId || '(none)');
            
            // ============================================================
            // FUNCTION: Apply diff using jsondiffpatch
            // ============================================================
            function applyDiff(current, diff) {
              try {
                console.log('Applying diff with jsondiffpatch...');
                const patched = jsondiffpatch.patch(current, diff);
                console.log('Diff applied successfully');
                return patched;
              } catch (e) {
                console.error('jsondiffpatch patch failed:', e.message);
                console.log('Falling back to manual deep merge...');
                return deepMerge(current, diff);
              }
            }
            
            function deepMerge(target, source) {
              if (!source) return target;
              const result = JSON.parse(JSON.stringify(target));
              
              for (const key in source) {
                if (key === '_t' && source[key] === 'a') {
                  // This is an array diff marker - handle arrays specially
                  continue;
                }
                if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                  if (!result[key]) result[key] = {};
                  result[key] = deepMerge(result[key], source[key]);
                } else {
                  result[key] = source[key];
                }
              }
              return result;
            }
            
            // ============================================================
            // CASE 1: Gist payload
            // ============================================================
            if (payloadType === 'gist' && gistId && gistId.length > 0) {
              console.log('📥 Downloading data from Gist:', gistId);
              
              const token = process.env.GITHUB_TOKEN;
              if (!token) {
                console.error('GITHUB_TOKEN not found in environment');
                process.exit(1);
              }
              
              const gistUrl = `https://api.github.com/gists/${gistId}`;
              
              (async function() {
                try {
                  const response = await fetch(gistUrl, {
                    headers: {
                      'Authorization': `token ${token}`,
                      'Accept': 'application/vnd.github.v3+json',
                      'User-Agent': 'BPO-Workflow'
                    }
                  });
                  
                  if (!response.ok) {
                    throw new Error(`Gist API returned ${response.status}`);
                  }
                  
                  const gistData = await response.json();
                  const files = gistData.files;
                  const fileNames = Object.keys(files);
                  if (fileNames.length === 0) {
                    throw new Error('No files found in gist');
                  }
                  
                  const fileContent = files[fileNames[0]].content;
                  console.log('Downloaded data length:', fileContent.length);
                  diffData = JSON.parse(fileContent);
                  console.log('Diff parsed successfully');
                  
                  // ✅ APPLY the diff to current data using jsondiffpatch
                  fullData = applyDiff(currentData, diffData);
                  
                  // Validate the merged data
                  if (!fullData.scenarios || !Array.isArray(fullData.scenarios)) {
                    console.error('❌ Invalid merged data: missing scenarios array');
                    console.log('Data keys:', Object.keys(fullData));
                    process.exit(1);
                  }
                  
                  fs.writeFileSync('data.json', JSON.stringify(fullData, null, 2));
                  console.log('✅ data.json updated successfully (merged from Gist diff)');
                  
                  // Clean up - delete the gist
                  if (token && gistId) {
                    console.log('🗑️ Deleting temporary Gist...');
                    try {
                      const deleteResponse = await fetch(`https://api.github.com/gists/${gistId}`, {
                        method: 'DELETE',
                        headers: {
                          'Authorization': `token ${token}`,
                          'Accept': 'application/vnd.github.v3+json'
                        }
                      });
                      if (deleteResponse.ok) {
                        console.log('✅ Gist deleted');
                      }
                    } catch (e) {
                      console.log('⚠️ Could not delete Gist:', e.message);
                    }
                  }
                } catch (e) {
                  console.error('Failed to process gist:', e.message);
                  process.exit(1);
                }
              })();
              
              setTimeout(() => {}, 30000);
              return;
            }
            
            // ============================================================
            // CASE 2: Direct diff payload
            // ============================================================
            else {
              console.log('Processing direct payload...');
              let payloadData = payload.data || '';
              
              if (payloadData && payloadData.length > 0) {
                try {
                  diffData = JSON.parse(payloadData);
                  console.log('Diff parsed successfully');
                  
                  // Check if this is already FULL data (has scenarios array)
                  if (diffData.scenarios && Array.isArray(diffData.scenarios)) {
                    fullData = diffData;
                    console.log('✅ Full data detected, saving directly');
                  } else {
                    // This is a DIFF - apply it to current data
                    console.log('✅ Diff detected, applying to current data');
                    fullData = applyDiff(currentData, diffData);
                    console.log('Diff applied successfully');
                  }
                } catch (e) {
                  console.error('Failed to parse payload data:', e.message);
                  process.exit(1);
                }
              } else {
                console.error('No data found in payload');
                process.exit(1);
              }
            }
            
            // ============================================================
            // VALIDATE AND SAVE
            // ============================================================
            if (fullData) {
              // If scenarios is missing or not an array, try to fix it
              if (!fullData.scenarios || !Array.isArray(fullData.scenarios)) {
                console.error('❌ Invalid data: scenarios is not an array');
                console.log('Current scenarios type:', typeof fullData.scenarios);
                console.log('scenarios keys:', fullData.scenarios ? Object.keys(fullData.scenarios) : 'undefined');
                
                // Try to extract scenarios from the diff if it's an object with array indices
                if (fullData.scenarios && typeof fullData.scenarios === 'object') {
                  const scenarioObj = fullData.scenarios;
                  const scenarioArray = [];
                  
                  // Check if it has array-like structure with numeric keys
                  for (const key in scenarioObj) {
                    if (key === '_t') continue;
                    const value = scenarioObj[key];
                    
                    // If value has id array, this might be a scenario
                    if (value && typeof value === 'object') {
                      // Try to extract scenario data
                      const scenario = { id: 'default', name: 'Manufacturing', processes: [] };
                      
                      // If it has id array, take the first one
                      if (value.id && Array.isArray(value.id) && value.id.length > 0) {
                        scenario.id = value.id[0];
                      }
                      if (value.name && Array.isArray(value.name) && value.name.length > 0) {
                        scenario.name = value.name[0];
                      }
                      
                      // Handle processes
                      if (value.processes && typeof value.processes === 'object') {
                        const processArray = [];
                        for (const pKey in value.processes) {
                          if (pKey === '_t') continue;
                          const pVal = value.processes[pKey];
                          // If it's an array of processes, take the first one
                          if (Array.isArray(pVal) && pVal.length > 0) {
                            processArray.push(pVal[0]);
                          } else if (pVal && typeof pVal === 'object' && pVal.id) {
                            processArray.push(pVal);
                          }
                        }
                        scenario.processes = processArray;
                      }
                      
                      // Only add if it has at least one process or seems valid
                      if (scenario.id || scenario.processes.length > 0) {
                        scenarioArray.push(scenario);
                      }
                    }
                  }
                  
                  if (scenarioArray.length > 0) {
                    fullData.scenarios = scenarioArray;
                    console.log('✅ Extracted scenarios from diff, count:', scenarioArray.length);
                  } else {
                    // Create a default scenario
                    fullData.scenarios = [{
                      id: 'default',
                      name: 'Manufacturing',
                      processes: []
                    }];
                    console.log('⚠️ Created default scenario');
                  }
                } else {
                  // Create a default scenario
                  fullData.scenarios = [{
                    id: 'default',
                    name: 'Manufacturing',
                    processes: []
                  }];
                  console.log('⚠️ Created default scenario');
                }
              }
              
              // Final validation
              if (!fullData.currentScenarioId) {
                fullData.currentScenarioId = 'default';
              }
              
              fs.writeFileSync('data.json', JSON.stringify(fullData, null, 2));
              console.log('✅ data.json updated successfully');
              console.log('Final scenarios count:', fullData.scenarios?.length || 0);
            } else {
              console.log('No data to save');
              process.exit(1);
            }
          "

      - name: Validate JSON
        run: |
          if [ -f data.json ] && [ -s data.json ]; then
            if ! jq empty data.json 2>/dev/null; then
              echo "❌ Invalid JSON in data.json"
              cat data.json | head -100
              exit 1
            fi
            echo "✅ JSON validation passed"
          fi

      - name: Commit and push
        run: |
          if [ -f data.json ] && git diff --quiet data.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config.user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Apply changes from web [skip ci]" || echo "No changes to commit"
            git push
          fi
