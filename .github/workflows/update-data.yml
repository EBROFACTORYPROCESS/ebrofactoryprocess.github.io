name: Update data.json from web

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Write payload to file
        run: |
          cat > payload.json << 'EOF'
          ${{ toJSON(github.event.client_payload) }}
          EOF

      - name: Apply changes
        run: |
          node -e "
            const fs = require('fs');
            
            console.log('=== Starting apply changes ===');
            
            // Read current data.json
            let currentData = {};
            try {
              const content = fs.readFileSync('data.json', 'utf8');
              currentData = JSON.parse(content);
              console.log('Current data loaded, size:', Object.keys(currentData).length);
            } catch (e) {
              console.log('No existing data.json, creating new one');
            }
            
            // Read payload
            const payloadContent = fs.readFileSync('payload.json', 'utf8');
            let payload;
            try {
              payload = JSON.parse(payloadContent);
              console.log('Payload parsed successfully');
              console.log('Payload keys:', Object.keys(payload));
            } catch (e) {
              console.error('Failed to parse payload.json:', e.message);
              process.exit(1);
            }
            
            let fullData = null;
            const payloadType = payload.type || 'diff';
            
            // ============================================================
            // CASE 1: Gist payload (large data)
            // ============================================================
            if (payloadType === 'gist') {
              const gistId = payload.gist_id;
              
              if (!gistId) {
                console.error('No gist_id provided');
                process.exit(1);
              }
              
              console.log('📥 Downloading data from Gist:', gistId);
              
              // Use Node.js fetch (available in v18+)
              fetch(`https://api.github.com/gists/${gistId}`, {
                headers: {
                  'Accept': 'application/vnd.github.v3+json',
                  'User-Agent': 'BPO-Workflow'
                }
              })
              .then(response => {
                if (!response.ok) {
                  throw new Error(`Gist API returned ${response.status}`);
                }
                return response.json();
              })
              .then(gistData => {
                const files = gistData.files;
                const fileNames = Object.keys(files);
                if (fileNames.length === 0) {
                  throw new Error('No files found in gist');
                }
                
                const fileContent = files[fileNames[0]].content;
                console.log('Downloaded data length:', fileContent.length);
                fullData = JSON.parse(fileContent);
                console.log('Data parsed successfully');
                
                // Apply changes
                applyChanges(fullData);
                
                // Clean up - delete the gist
                const token = process.env.GITHUB_TOKEN;
                if (token && gistId) {
                  console.log('🗑️ Deleting temporary Gist...');
                  fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'DELETE',
                    headers: {
                      'Authorization': `token ${token}`,
                      'Accept': 'application/vnd.github.v3+json'
                    }
                  })
                  .then(() => console.log('✅ Gist deleted'))
                  .catch(() => console.log('⚠️ Could not delete Gist (may need manual cleanup)'));
                }
              })
              .catch(error => {
                console.error('Error processing gist:', error.message);
                process.exit(1);
              });
              
              // Wait for async operations to complete
              function waitForCompletion() {
                if (fullData === null) {
                  setTimeout(waitForCompletion, 500);
                  return;
                }
                // All done, exit with success
                console.log('✅ All operations completed');
                process.exit(0);
              }
              
              // Start the wait loop
              setTimeout(waitForCompletion, 1000);
              return; // Exit early to avoid duplicate processing
            }
            
            // ============================================================
            // CASE 2: Direct diff payload (small data)
            // ============================================================
            else {
              console.log('Processing direct payload...');
              let payloadData = payload.data || '';
              
              if (!payloadData) {
                console.error('No data found in payload');
                process.exit(1);
              }
              
              fullData = JSON.parse(payloadData);
              console.log('Payload parsed successfully');
              applyChanges(fullData);
            }
            
            // ============================================================
            // Apply the changes (shared function)
            // ============================================================
            function applyChanges(data) {
              if (!data) {
                console.log('No data to apply');
                process.exit(1);
              }
              
              console.log('Applying changes...');
              let newData;
              
              function deepMerge(target, source) {
                for (const key in source) {
                  if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                    if (!target[key]) target[key] = {};
                    deepMerge(target[key], source[key]);
                  } else {
                    target[key] = source[key];
                  }
                }
                return target;
              }
              
              if (data._full || payload.type === 'full') {
                newData = data._full || data;
                console.log('Full data replacement');
              } else {
                newData = deepMerge(JSON.parse(JSON.stringify(currentData)), data);
                console.log('Deep merge applied');
              }
              
              fs.writeFileSync('data.json', JSON.stringify(newData, null, 2));
              console.log('✅ data.json updated successfully');
            }
          "

      - name: Validate JSON
        run: |
          if [ -f data.json ] && [ -s data.json ]; then
            if ! jq empty data.json 2>/dev/null; then
              echo "❌ Invalid JSON in data.json"
              cat data.json | head -100
              exit 1
            fi
            echo "✅ JSON validation passed"
          else
            echo "⚠️ data.json not found or empty"
          fi

      - name: Commit and push
        run: |
          if [ -f data.json ] && git diff --quiet data.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Apply changes from web [skip ci]" || echo "No changes to commit"
            git push
          fi
