name: Update data.json from web

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Write payload to file
        run: |
          cat > payload.json << 'EOF'
          ${{ toJSON(github.event.client_payload) }}
          EOF

      - name: Apply changes
        run: |
          node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            console.log('=== Starting apply changes ===');
            
            // Read current data.json
            let currentData = {};
            try {
              const content = fs.readFileSync('data.json', 'utf8');
              currentData = JSON.parse(content);
              console.log('Current data loaded, size:', Object.keys(currentData).length);
            } catch (e) {
              console.log('No existing data.json, creating new one');
            }
            
            // Read payload
            const payloadContent = fs.readFileSync('payload.json', 'utf8');
            let payload;
            try {
              payload = JSON.parse(payloadContent);
              console.log('Payload parsed successfully');
              console.log('Payload keys:', Object.keys(payload));
            } catch (e) {
              console.error('Failed to parse payload.json:', e.message);
              process.exit(1);
            }
            
            let fullData = null;
            const payloadType = payload.type || 'diff';
            
            // ============================================================
            // CASE 1: Gist payload (large data)
            // ============================================================
            if (payloadType === 'gist') {
              const gistId = payload.gist_id;
              console.log('📥 Downloading data from Gist:', gistId);
              
              // Use GitHub CLI to download the gist content
              try {
                // Get the gist content using curl
                const gistUrl = `https://api.github.com/gists/${gistId}`;
                const gistResponse = execSync(`curl -s -H "Accept: application/vnd.github.v3+json" ${gistUrl}`, { encoding: 'utf8' });
                const gistData = JSON.parse(gistResponse);
                
                // Get the file content (the first file in the gist)
                const files = gistData.files;
                const fileNames = Object.keys(files);
                if (fileNames.length === 0) {
                  console.error('No files found in gist');
                  process.exit(1);
                }
                
                const fileContent = files[fileNames[0]].content;
                console.log('Downloaded data length:', fileContent.length);
                
                try {
                  fullData = JSON.parse(fileContent);
                  console.log('Data parsed successfully');
                } catch (e) {
                  console.error('Failed to parse downloaded data:', e.message);
                  process.exit(1);
                }
              } catch (e) {
                console.error('Failed to download from gist:', e.message);
                process.exit(1);
              }
            }
            
            // ============================================================
            // CASE 2: Direct diff payload
            // ============================================================
            else {
              console.log('Processing direct payload...');
              let payloadData = payload.data || '';
              
              if (!payloadData) {
                console.error('No data found in payload');
                process.exit(1);
              }
              
              try {
                fullData = JSON.parse(payloadData);
                console.log('Payload parsed successfully');
              } catch (e) {
                console.error('Failed to parse payload data:', e.message);
                console.log('Payload data preview:', payloadData.substring(0, 200));
                process.exit(1);
              }
            }
            
            // ============================================================
            // Apply the changes
            // ============================================================
            if (fullData) {
              console.log('Applying changes...');
              let newData;
              
              function deepMerge(target, source) {
                for (const key in source) {
                  if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                    if (!target[key]) target[key] = {};
                    deepMerge(target[key], source[key]);
                  } else {
                    target[key] = source[key];
                  }
                }
                return target;
              }
              
              if (fullData._full || payload.type === 'full') {
                newData = fullData._full || fullData;
                console.log('Full data replacement');
              } else {
                newData = deepMerge(JSON.parse(JSON.stringify(currentData)), fullData);
                console.log('Deep merge applied');
              }
              
              fs.writeFileSync('data.json', JSON.stringify(newData, null, 2));
              console.log('✅ data.json updated successfully');
            } else {
              console.log('No data to apply');
              process.exit(1);
            }
          "

      - name: Validate JSON
        run: |
          if [ -f data.json ] && [ -s data.json ]; then
            if ! jq empty data.json 2>/dev/null; then
              echo "❌ Invalid JSON in data.json"
              cat data.json | head -100
              exit 1
            fi
            echo "✅ JSON validation passed"
          fi

      - name: Commit and push
        run: |
          if [ -f data.json ] && git diff --quiet data.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Apply changes from web [skip ci]" || echo "No changes to commit"
            git push
          fi
