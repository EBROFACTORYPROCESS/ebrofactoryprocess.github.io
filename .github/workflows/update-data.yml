name: Update data.json from web

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install jsondiffpatch
        run: npm install jsondiffpatch@0.4.1

      - name: Write payload to file
        run: |
          cat > payload.json << 'EOF'
          ${{ toJSON(github.event.client_payload) }}
          EOF

      - name: Apply changes
        run: |
          node -e "
            const fs = require('fs');
            const jsondiffpatch = require('jsondiffpatch');
            
            console.log('=== Starting apply changes ===');
            
            // Read current data.json
            let currentData = {};
            try {
              const content = fs.readFileSync('data.json', 'utf8');
              currentData = JSON.parse(content);
              console.log('Current data loaded, scenarios:', currentData.scenarios?.length || 0);
            } catch (e) {
              console.log('No existing data.json, creating new one');
            }
            
            // Read payload
            const payloadContent = fs.readFileSync('payload.json', 'utf8');
            console.log('Payload content length:', payloadContent.length);
            
            let payload;
            try {
              payload = JSON.parse(payloadContent);
              console.log('Payload parsed successfully');
              console.log('Payload keys:', Object.keys(payload));
            } catch (e) {
              console.error('Failed to parse payload.json:', e.message);
              process.exit(1);
            }
            
            const payloadType = payload.type || 'diff';
            const gistId = payload.gist_id || '';
            let finalData = null;
            
            console.log('Payload type:', payloadType);
            console.log('Gist ID:', gistId || '(none)');
            
            // ============================================================
            // FUNCTION: Apply diff to current data
            // ============================================================
            function applyDiffToCurrent(diffData) {
              console.log('Applying diff to current data...');
              
              // Use jsondiffpatch to apply the diff
              try {
                const result = jsondiffpatch.patch(currentData, diffData);
                console.log('jsondiffpatch.patch succeeded');
                return result;
              } catch (e) {
                console.error('jsondiffpatch.patch failed:', e.message);
                console.log('Falling back to manual merge...');
                return manualMerge(currentData, diffData);
              }
            }
            
            // ============================================================
            // FUNCTION: Manual merge (fallback)
            // ============================================================
            function manualMerge(target, source) {
              // Create a deep copy of the target
              const result = JSON.parse(JSON.stringify(target));
              
              // Process each key in the source (diff)
              for (const key in source) {
                if (key === '_t') continue;
                const sourceVal = source[key];
                
                if (key === 'scenarios' && sourceVal && typeof sourceVal === 'object') {
                  // Handle scenarios array diff
                  if (sourceVal._t === 'a') {
                    // This is an array diff
                    result.scenarios = mergeArrayDiff(result.scenarios || [], sourceVal);
                  } else if (Array.isArray(sourceVal)) {
                    // Source is an array - replace the whole scenarios array
                    // But we need to merge, not replace
                    result.scenarios = mergeArrayWithNew(result.scenarios || [], sourceVal);
                  } else {
                    // Source is an object with numeric keys (diff format)
                    result.scenarios = mergeScenariosObject(result.scenarios || [], sourceVal);
                  }
                } else if (sourceVal && typeof sourceVal === 'object' && !Array.isArray(sourceVal)) {
                  // Recursive merge for nested objects
                  if (!result[key] || typeof result[key] !== 'object') {
                    result[key] = {};
                  }
                  result[key] = manualMerge(result[key], sourceVal);
                } else {
                  // Primitive value - direct assignment
                  result[key] = sourceVal;
                }
              }
              
              return result;
            }
            
            // ============================================================
            // FUNCTION: Merge array diff (with _t: 'a')
            // ============================================================
            function mergeArrayDiff(currentArray, diff) {
              if (!Array.isArray(currentArray)) currentArray = [];
              const result = [...currentArray];
              const removals = [];
              const insertions = [];
              const updates = [];
              
              for (const key in diff) {
                if (key === '_t') continue;
                const value = diff[key];
                
                if (key.startsWith('_')) {
                  const index = parseInt(key.substring(1));
                  
                  if (Array.isArray(value)) {
                    if (value.length === 2 && value[1] === 0) {
                      // Removal: [oldValue, 0]
                      removals.push(index);
                    } else if (value.length === 3 && value[2] === 3) {
                      // Move: [oldValue, newIndex, 3]
                      if (index < result.length) {
                        insertions.push({ index: value[1], value: result[index] });
                        removals.push(index);
                      }
                    } else if (value.length === 3 && value[2] === 0) {
                      // Replacement: [newValue, 0, 0]
                      if (index < result.length) {
                        updates.push({ index: index, value: value[0] });
                      }
                    }
                  } else if (value && typeof value === 'object') {
                    // Nested diff on this index
                    if (index < result.length && result[index] && typeof result[index] === 'object') {
                      result[index] = manualMerge(result[index], value);
                    }
                  }
                } else {
                  const index = parseInt(key);
                  if (!isNaN(index) && index >= 0) {
                    if (Array.isArray(value) && value.length === 1) {
                      // Insert new item
                      insertions.push({ index: index, value: value[0] });
                    } else if (value && typeof value === 'object' && !Array.isArray(value)) {
                      // New item as object
                      if (index < result.length) {
                        result[index] = value;
                      } else {
                        insertions.push({ index: index, value: value });
                      }
                    }
                  }
                }
              }
              
              // Process removals (from highest index to lowest to avoid shifting)
              removals.sort((a, b) => b - a);
              for (const idx of removals) {
                if (idx < result.length) {
                  result.splice(idx, 1);
                }
              }
              
              // Process updates
              for (const update of updates) {
                if (update.index < result.length) {
                  result[update.index] = update.value;
                }
              }
              
              // Process insertions (from highest index to lowest to avoid shifting)
              insertions.sort((a, b) => b.index - a.index);
              for (const ins of insertions) {
                if (ins.index < result.length) {
                  result.splice(ins.index, 0, ins.value);
                } else {
                  result.push(ins.value);
                }
              }
              
              return result;
            }
            
            // ============================================================
            // FUNCTION: Merge scenarios object (with numeric keys)
            // ============================================================
            function mergeScenariosObject(currentArray, sourceObj) {
              const result = [...currentArray];
              
              for (const key in sourceObj) {
                if (key === '_t') continue;
                const value = sourceObj[key];
                
                if (key.startsWith('_')) {
                  const index = parseInt(key.substring(1));
                  if (Array.isArray(value) && value.length === 2 && value[1] === 0) {
                    // Removal
                    if (index < result.length) {
                      result.splice(index, 1);
                    }
                  } else if (value && typeof value === 'object' && !Array.isArray(value)) {
                    // Nested diff on this scenario
                    if (index < result.length && result[index] && typeof result[index] === 'object') {
                      result[index] = manualMerge(result[index], value);
                    }
                  }
                } else {
                  const index = parseInt(key);
                  if (!isNaN(index) && index >= 0) {
                    if (Array.isArray(value) && value.length === 1) {
                      // New scenario
                      result.push(value[0]);
                    } else if (value && typeof value === 'object' && !Array.isArray(value)) {
                      if (index < result.length) {
                        result[index] = value;
                      } else {
                        result.push(value);
                      }
                    }
                  }
                }
              }
              
              return result;
            }
            
            // ============================================================
            // FUNCTION: Merge array with new items (simple replace)
            // ============================================================
            function mergeArrayWithNew(currentArray, newArray) {
              // If the new array has valid items, merge them
              const result = [...currentArray];
              for (const item of newArray) {
                if (item && typeof item === 'object' && item.id) {
                  // Check if this item already exists
                  const exists = result.some(existing => existing && existing.id === item.id);
                  if (!exists) {
                    result.push(item);
                  }
                }
              }
              return result;
            }
            
            // ============================================================
            // FUNCTION: Validate and save
            // ============================================================
            function validateAndSave(data) {
              if (!data) {
                console.error('No data to save');
                return false;
              }
              
              // Ensure scenarios is an array
              if (!data.scenarios || !Array.isArray(data.scenarios)) {
                console.error('Invalid data: scenarios is not an array');
                console.log('scenarios type:', typeof data.scenarios);
                if (data.scenarios && typeof data.scenarios === 'object') {
                  // Try to convert object to array
                  const scenarioArray = [];
                  for (const key in data.scenarios) {
                    if (key === '_t') continue;
                    const value = data.scenarios[key];
                    if (value && typeof value === 'object') {
                      const scenario = { id: 'default', name: 'Manufacturing', processes: [] };
                      if (value.id) scenario.id = Array.isArray(value.id) ? value.id[0] : value.id;
                      if (value.name) scenario.name = Array.isArray(value.name) ? value.name[0] : value.name;
                      if (value.processes) {
                        scenario.processes = Array.isArray(value.processes) ? value.processes : [];
                      }
                      scenarioArray.push(scenario);
                    }
                  }
                  if (scenarioArray.length > 0) {
                    data.scenarios = scenarioArray;
                    console.log('Converted scenarios from object to array, count:', scenarioArray.length);
                  } else {
                    data.scenarios = [];
                  }
                } else {
                  data.scenarios = [];
                }
              }
              
              // Ensure each scenario has valid processes
              for (let i = 0; i < data.scenarios.length; i++) {
                const sc = data.scenarios[i];
                if (!sc) continue;
                if (!sc.processes || !Array.isArray(sc.processes)) {
                  sc.processes = [];
                }
                // Filter out invalid processes
                sc.processes = sc.processes.filter(p => p && typeof p === 'object' && p.id);
                if (!sc.id) {
                  sc.id = 'scenario_' + Date.now() + '_' + i;
                }
              }
              
              // Fix currentScenarioId
              if (Array.isArray(data.currentScenarioId)) {
                data.currentScenarioId = data.currentScenarioId[0] || 'default';
              }
              if (!data.currentScenarioId && data.scenarios.length > 0) {
                data.currentScenarioId = data.scenarios[0].id || 'default';
              }
              
              // Ensure master data exists
              if (!data.departments || !Array.isArray(data.departments)) {
                data.departments = ['Sales', 'Production Planning', 'Material Planning', 'Material Handling', 'Purchase', 'Production Execution', 'Parts Quality', 'Vehicle Quality', 'Finance', 'Trade & Compliance'];
              }
              
              if (!data.sysNameList || !Array.isArray(data.sysNameList)) {
                data.sysNameList = ['SAP', 'LES', 'MES', 'KAPTURE', 'WMS', 'To Be Determined'];
              }
              
              if (!data.businessStatuses || !Array.isArray(data.businessStatuses)) {
                data.businessStatuses = [
                  { value: 'Not Defined', color: 'red' },
                  { value: 'In Progress', color: 'yellow' },
                  { value: 'Completed', color: 'green' }
                ];
              }
              
              if (!data.sysStatusList || !Array.isArray(data.sysStatusList)) {
                data.sysStatusList = [
                  { value: 'Operational', color: 'green' },
                  { value: 'Completed', color: 'green' },
                  { value: 'Offline', color: 'red' },
                  { value: 'To Be Implemented', color: 'red' },
                  { value: 'Work in Progress', color: 'yellow' }
                ];
              }
              
              if (!data.sysRespList || !Array.isArray(data.sysRespList)) {
                data.sysRespList = [];
              }
              
              console.log('Final scenarios count:', data.scenarios.length);
              console.log('Final currentScenarioId:', data.currentScenarioId);
              
              fs.writeFileSync('data.json', JSON.stringify(data, null, 2));
              console.log('data.json updated successfully');
              return true;
            }
            
            // ============================================================
            // PROCESS PAYLOAD
            // ============================================================
            if (payloadType === 'gist' && gistId && gistId.length > 0) {
              console.log('Downloading data from Gist:', gistId);
              
              const token = process.env.GITHUB_TOKEN;
              if (!token) {
                console.error('GITHUB_TOKEN not found');
                process.exit(1);
              }
              
              const gistUrl = 'https://api.github.com/gists/' + gistId;
              
              fetch(gistUrl, {
                headers: {
                  'Authorization': 'token ' + token,
                  'Accept': 'application/vnd.github.v3+json',
                  'User-Agent': 'BPO-Workflow'
                }
              })
              .then(function(response) {
                if (!response.ok) {
                  throw new Error('Gist API returned ' + response.status);
                }
                return response.json();
              })
              .then(function(gistData) {
                const files = gistData.files;
                const fileNames = Object.keys(files);
                if (fileNames.length === 0) {
                  throw new Error('No files found in gist');
                }
                
                const fileContent = files[fileNames[0]].content;
                console.log('Downloaded data length:', fileContent.length);
                const diffData = JSON.parse(fileContent);
                console.log('Diff parsed successfully');
                
                // Determine if this is a diff or full data
                const isFullData = diffData.scenarios && Array.isArray(diffData.scenarios) && diffData.scenarios.length > 0;
                let finalData;
                
                if (isFullData) {
                  // If it's full data, use it directly
                  finalData = diffData;
                  console.log('Full data detected, using directly');
                } else {
                  // Apply the diff to current data
                  finalData = applyDiffToCurrent(diffData);
                  console.log('Diff applied to current data');
                }
                
                const success = validateAndSave(finalData);
                if (!success) process.exit(1);
                
                if (token && gistId) {
                  console.log('Deleting temporary Gist...');
                  return fetch('https://api.github.com/gists/' + gistId, {
                    method: 'DELETE',
                    headers: {
                      'Authorization': 'token ' + token,
                      'Accept': 'application/vnd.github.v3+json'
                    }
                  });
                }
              })
              .then(function() {
                console.log('Gist deleted');
              })
              .catch(function(e) {
                console.error('Failed to process gist:', e.message);
                process.exit(1);
              });
              
              setTimeout(function() {}, 30000);
              
            } else {
              // Direct diff payload
              console.log('Processing direct payload...');
              let payloadData = payload.data || '';
              console.log('Payload data length:', payloadData.length);
              
              if (payloadData && payloadData.length > 0) {
                try {
                  const parsedData = JSON.parse(payloadData);
                  console.log('Payload parsed successfully');
                  console.log('Parsed data keys:', Object.keys(parsedData));
                  
                  // Determine if this is a diff or full data
                  const isFullData = parsedData.scenarios && Array.isArray(parsedData.scenarios) && parsedData.scenarios.length > 0;
                  let finalData;
                  
                  if (isFullData) {
                    finalData = parsedData;
                    console.log('Full data detected, using directly');
                  } else {
                    // Apply the diff to current data
                    finalData = applyDiffToCurrent(parsedData);
                    console.log('Diff applied to current data');
                  }
                  
                  const success = validateAndSave(finalData);
                  if (!success) process.exit(1);
                  
                } catch (e) {
                  console.error('Failed to parse payload data:', e.message);
                  console.log('Payload data preview:', payloadData.substring(0, 200));
                  process.exit(1);
                }
              } else {
                console.error('No data found in payload');
                process.exit(1);
              }
            }
          "

      - name: Validate JSON
        run: |
          if [ -f data.json ] && [ -s data.json ]; then
            if ! jq empty data.json 2>/dev/null; then
              echo "Invalid JSON in data.json"
              cat data.json | head -100
              exit 1
            fi
            echo "JSON validation passed"
          fi

      - name: Commit and push
        run: |
          if [ -f data.json ] && git diff --quiet data.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Apply changes from web [skip ci]" || echo "No changes to commit"
            git push
          fi
