name: Update data.json from web

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install diff lz-string

      - name: Write payload to file
        run: |
          cat > payload.json << 'EOF'
          ${{ toJSON(github.event.client_payload) }}
          EOF

      - name: Debug payload
        run: |
          echo "=== Payload Content ==="
          cat payload.json
          echo "=== End Payload ==="

      - name: Apply changes
        run: |
          node -e "
            const fs = require('fs');
            const { diffJson, applyPatch } = require('diff');
            const LZString = require('lz-string');
            
            console.log('=== Starting apply changes ===');
            
            // Read current data.json
            let currentData = {};
            try {
              const content = fs.readFileSync('data.json', 'utf8');
              currentData = JSON.parse(content);
              console.log('Current data loaded, size:', Object.keys(currentData).length);
            } catch (e) {
              console.log('No existing data.json, creating new one');
            }
            
            // Read payload
            const payloadContent = fs.readFileSync('payload.json', 'utf8');
            console.log('Payload content length:', payloadContent.length);
            
            let payload;
            try {
              payload = JSON.parse(payloadContent);
              console.log('Payload parsed successfully');
              console.log('Payload keys:', Object.keys(payload));
            } catch (e) {
              console.error('Failed to parse payload.json:', e.message);
              process.exit(1);
            }
            
            const payloadType = payload.type || 'diff';
            const gistId = payload.gist_id || '';
            let fullData = null;
            
            console.log('Payload type:', payloadType);
            console.log('Gist ID:', gistId || '(none)');
            
            // ============================================================
            // CASE 1: Gist payload (large data)
            // ============================================================
            if (payloadType === 'gist' && gistId) {
              console.log('📥 Downloading data from Gist:', gistId);
              
              // Use the GitHub token from environment
              const token = process.env.GITHUB_TOKEN;
              if (!token) {
                console.error('GITHUB_TOKEN not found in environment');
                process.exit(1);
              }
              
              // Use Node.js fetch to get the gist
              const gistUrl = `https://api.github.com/gists/${gistId}`;
              console.log('Fetching from:', gistUrl);
              
              fetch(gistUrl, {
                headers: {
                  'Authorization': `token ${token}`,
                  'Accept': 'application/vnd.github.v3+json',
                  'User-Agent': 'BPO-Workflow'
                }
              })
              .then(response => {
                console.log('Gist API response status:', response.status);
                if (!response.ok) {
                  throw new Error(`Gist API returned ${response.status}: ${response.statusText}`);
                }
                return response.json();
              })
              .then(gistData => {
                console.log('Gist data retrieved successfully');
                const files = gistData.files;
                const fileNames = Object.keys(files);
                if (fileNames.length === 0) {
                  throw new Error('No files found in gist');
                }
                
                const fileContent = files[fileNames[0]].content;
                console.log('Downloaded data length:', fileContent.length);
                
                try {
                  fullData = JSON.parse(fileContent);
                  console.log('Data parsed successfully');
                  applyChanges();
                } catch (e) {
                  console.error('Failed to parse downloaded data:', e.message);
                  process.exit(1);
                }
              })
              .catch(e => {
                console.error('Failed to download from gist:', e.message);
                process.exit(1);
              });
              
              // Wait for the async operation to complete
              function waitForData() {
                if (fullData === null) {
                  setTimeout(waitForData, 500);
                } else {
                  applyChanges();
                }
              }
              
              // Define the apply function
              function applyChanges() {
                if (!fullData) {
                  console.log('No data to apply');
                  process.exit(1);
                }
                
                console.log('Applying changes...');
                let newData;
                
                try {
                  const patch = diffJson(currentData, fullData);
                  newData = applyPatch(currentData, patch);
                  console.log('Diff applied successfully');
                } catch (e) {
                  console.error('Failed to apply diff:', e.message);
                  // Fallback: direct merge
                  newData = fullData;
                  console.log('Using direct merge as fallback');
                }
                
                if (newData) {
                  fs.writeFileSync('data.json', JSON.stringify(newData, null, 2));
                  console.log('✅ data.json updated successfully');
                } else {
                  console.log('No data to write');
                  process.exit(1);
                }
              }
              
              // Start the async process
              (async function() {
                try {
                  const token = process.env.GITHUB_TOKEN;
                  if (!token) {
                    console.error('GITHUB_TOKEN not found');
                    process.exit(1);
                  }
                  
                  const gistUrl = `https://api.github.com/gists/${gistId}`;
                  const response = await fetch(gistUrl, {
                    headers: {
                      'Authorization': `token ${token}`,
                      'Accept': 'application/vnd.github.v3+json',
                      'User-Agent': 'BPO-Workflow'
                    }
                  });
                  
                  if (!response.ok) {
                    throw new Error(`Gist API returned ${response.status}`);
                  }
                  
                  const gistData = await response.json();
                  const files = gistData.files;
                  const fileNames = Object.keys(files);
                  if (fileNames.length === 0) {
                    throw new Error('No files found in gist');
                  }
                  
                  const fileContent = files[fileNames[0]].content;
                  console.log('Downloaded data length:', fileContent.length);
                  fullData = JSON.parse(fileContent);
                  console.log('Data parsed successfully');
                  
                  // Apply changes
                  let newData;
                  try {
                    const patch = diffJson(currentData, fullData);
                    newData = applyPatch(currentData, patch);
                    console.log('Diff applied successfully');
                  } catch (e) {
                    console.error('Failed to apply diff:', e.message);
                    newData = fullData;
                    console.log('Using direct merge as fallback');
                  }
                  
                  if (newData) {
                    fs.writeFileSync('data.json', JSON.stringify(newData, null, 2));
                    console.log('✅ data.json updated successfully');
                  }
                  
                  // Clean up - delete the gist
                  const token2 = process.env.GITHUB_TOKEN;
                  if (token2 && gistId) {
                    console.log('🗑️ Deleting temporary Gist...');
                    try {
                      const deleteResponse = await fetch(`https://api.github.com/gists/${gistId}`, {
                        method: 'DELETE',
                        headers: {
                          'Authorization': `token ${token2}`,
                          'Accept': 'application/vnd.github.v3+json'
                        }
                      });
                      if (deleteResponse.ok) {
                        console.log('✅ Gist deleted');
                      } else {
                        console.log('⚠️ Could not delete Gist (may need manual cleanup)');
                      }
                    } catch (e) {
                      console.log('⚠️ Could not delete Gist:', e.message);
                    }
                  }
                  
                } catch (e) {
                  console.error('Failed to process gist:', e.message);
                  process.exit(1);
                }
              })();
              
              // Keep the process alive
              setTimeout(() => {}, 30000);
              return;
            }
            
            // ============================================================
            // CASE 2: Direct diff payload
            // ============================================================
            else {
              console.log('Processing direct payload...');
              let payloadData = payload.data || '';
              
              if (payloadData && payloadData.length > 0) {
                try {
                  fullData = JSON.parse(payloadData);
                  console.log('Payload parsed successfully');
                } catch (e) {
                  console.error('Failed to parse payload data:', e.message);
                  process.exit(1);
                }
              } else {
                console.error('No data found in payload');
                process.exit(1);
              }
              
              // Apply changes
              let newData;
              try {
                const patch = diffJson(currentData, fullData);
                newData = applyPatch(currentData, patch);
                console.log('Diff applied successfully');
              } catch (e) {
                console.error('Failed to apply diff:', e.message);
                newData = fullData;
                console.log('Using direct merge as fallback');
              }
              
              if (newData) {
                fs.writeFileSync('data.json', JSON.stringify(newData, null, 2));
                console.log('✅ data.json updated successfully');
              }
            }
          "

      - name: Validate JSON
        run: |
          if [ -f data.json ] && [ -s data.json ]; then
            if ! jq empty data.json 2>/dev/null; then
              echo "❌ Invalid JSON in data.json"
              cat data.json | head -100
              exit 1
            fi
            echo "✅ JSON validation passed"
          else
            echo "⚠️ data.json not found or empty"
          fi

      - name: Commit and push
        run: |
          if [ -f data.json ] && git diff --quiet data.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config.user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Apply changes from web [skip ci]" || echo "No changes to commit"
            git push
          fi
