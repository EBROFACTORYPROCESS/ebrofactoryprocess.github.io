name: Update data.json from web

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install jsondiffpatch
        run: npm install jsondiffpatch@0.4.1

      - name: Write payload to file
        run: |
          cat > payload.json << 'EOF'
          ${{ toJSON(github.event.client_payload) }}
          EOF

      - name: Apply changes
        run: |
          node -e "
            const fs = require('fs');
            const jsondiffpatch = require('jsondiffpatch');
            
            console.log('=== Starting apply changes ===');
            
            // Read current data.json
            let currentData = {};
            try {
              const content = fs.readFileSync('data.json', 'utf8');
              currentData = JSON.parse(content);
              console.log('Current data loaded, scenarios:', currentData.scenarios?.length || 0);
            } catch (e) {
              console.log('No existing data.json, creating new one');
            }
            
            // Read payload
            const payloadContent = fs.readFileSync('payload.json', 'utf8');
            console.log('Payload content length:', payloadContent.length);
            
            let payload;
            try {
              payload = JSON.parse(payloadContent);
              console.log('Payload parsed successfully');
              console.log('Payload keys:', Object.keys(payload));
            } catch (e) {
              console.error('Failed to parse payload.json:', e.message);
              process.exit(1);
            }
            
            const payloadType = payload.type || 'diff';
            const gistId = payload.gist_id || '';
            let fullData = null;
            
            console.log('Payload type:', payloadType);
            console.log('Gist ID:', gistId || '(none)');
            
            // ============================================================
            // FUNCTION: Process and save data
            // ============================================================
            function processAndSave(dataToApply, isFullData) {
              let dataToSave = null;
              
              if (isFullData) {
                dataToSave = dataToApply;
                console.log('Full data detected, saving directly');
              } else {
                console.log('Diff detected, applying to current data using jsondiffpatch...');
                try {
                  dataToSave = jsondiffpatch.patch(currentData, dataToApply);
                  console.log('Diff applied successfully using jsondiffpatch');
                } catch (e) {
                  console.error('jsondiffpatch failed:', e.message);
                  console.log('Falling back to manual merge...');
                  dataToSave = manualMerge(currentData, dataToApply);
                }
              }
              
              return validateAndSave(dataToSave);
            }
            
            // ============================================================
            // FUNCTION: Manual merge (fallback)
            // ============================================================
            function manualMerge(target, source) {
              if (!source) return target;
              const result = JSON.parse(JSON.stringify(target || {}));
              
              for (const key in source) {
                if (key === '_t') continue;
                const sourceVal = source[key];
                const targetVal = result[key];
                
                if (sourceVal && typeof sourceVal === 'object' && !Array.isArray(sourceVal)) {
                  if (!targetVal || typeof targetVal !== 'object' || Array.isArray(targetVal)) {
                    result[key] = {};
                  }
                  result[key] = manualMerge(result[key], sourceVal);
                } else {
                  result[key] = sourceVal;
                }
              }
              return result;
            }
            
            // ============================================================
            // FUNCTION: Validate and save
            // ============================================================
            function validateAndSave(data) {
              if (!data) {
                console.error('No data to save');
                return false;
              }
              
              // Fix: Ensure scenarios is an array
              if (!data.scenarios || !Array.isArray(data.scenarios)) {
                console.error('Invalid data: scenarios is not an array');
                console.log('scenarios type:', typeof data.scenarios);
                
                if (data.scenarios && typeof data.scenarios === 'object') {
                  const scenarioObj = data.scenarios;
                  const scenarioArray = [];
                  
                  for (const key in scenarioObj) {
                    if (key === '_t') continue;
                    const value = scenarioObj[key];
                    if (value && typeof value === 'object') {
                      const scenario = { id: 'default', name: 'Manufacturing', processes: [] };
                      
                      if (value.id) {
                        scenario.id = Array.isArray(value.id) ? value.id[0] : value.id;
                      }
                      if (value.name) {
                        scenario.name = Array.isArray(value.name) ? value.name[0] : value.name;
                      }
                      if (value.processes && typeof value.processes === 'object') {
                        const processArray = [];
                        for (const pKey in value.processes) {
                          if (pKey === '_t') continue;
                          const pVal = value.processes[pKey];
                          if (Array.isArray(pVal) && pVal.length > 0) {
                            processArray.push(pVal[0]);
                          } else if (pVal && typeof pVal === 'object' && pVal.id) {
                            processArray.push(pVal);
                          }
                        }
                        scenario.processes = processArray;
                      }
                      
                      if (scenario.id || scenario.processes.length > 0) {
                        scenarioArray.push(scenario);
                      }
                    }
                  }
                  
                  if (scenarioArray.length > 0) {
                    data.scenarios = scenarioArray;
                    console.log('Converted scenarios from object to array, count:', scenarioArray.length);
                  } else {
                    data.scenarios = [{
                      id: 'default',
                      name: 'Manufacturing',
                      processes: []
                    }];
                    console.log('Created default scenario');
                  }
                } else {
                  data.scenarios = [{
                    id: 'default',
                    name: 'Manufacturing',
                    processes: []
                  }];
                  console.log('Created default scenario');
                }
              }
              
              // Fix currentScenarioId
              if (Array.isArray(data.currentScenarioId)) {
                console.log('currentScenarioId is an array, converting to string');
                data.currentScenarioId = data.currentScenarioId[0] || 'default';
              }
              if (!data.currentScenarioId) {
                data.currentScenarioId = data.scenarios[0]?.id || 'default';
              }
              
              // Ensure each scenario has valid processes
              for (let i = 0; i < data.scenarios.length; i++) {
                const sc = data.scenarios[i];
                if (!sc) continue;
                if (!sc.processes || !Array.isArray(sc.processes)) {
                  console.log('Scenario ' + i + ' has invalid processes, creating empty array');
                  sc.processes = [];
                }
                if (!sc.id) {
                  sc.id = 'scenario_' + Date.now() + '_' + i;
                }
              }
              
              // Ensure master data exists
              if (!data.departments || !Array.isArray(data.departments)) {
                data.departments = ['Sales', 'Production Planning', 'Material Planning', 'Material Handling', 'Purchase', 'Production Execution', 'Parts Quality', 'Vehicle Quality', 'Finance', 'Trade & Compliance'];
              }
              
              if (!data.sysNameList || !Array.isArray(data.sysNameList)) {
                data.sysNameList = ['SAP', 'LES', 'MES', 'KAPTURE', 'WMS', 'To Be Determined'];
              }
              
              if (!data.businessStatuses || !Array.isArray(data.businessStatuses)) {
                data.businessStatuses = [
                  { value: 'Not Defined', color: 'red' },
                  { value: 'In Progress', color: 'yellow' },
                  { value: 'Completed', color: 'green' }
                ];
              }
              
              if (!data.sysStatusList || !Array.isArray(data.sysStatusList)) {
                data.sysStatusList = [
                  { value: 'Operational', color: 'green' },
                  { value: 'Completed', color: 'green' },
                  { value: 'Offline', color: 'red' },
                  { value: 'To Be Implemented', color: 'red' },
                  { value: 'Work in Progress', color: 'yellow' }
                ];
              }
              
              if (!data.sysRespList || !Array.isArray(data.sysRespList)) {
                data.sysRespList = [];
              }
              
              fs.writeFileSync('data.json', JSON.stringify(data, null, 2));
              console.log('data.json updated successfully');
              console.log('Final scenarios count:', data.scenarios.length);
              console.log('Final currentScenarioId:', data.currentScenarioId);
              return true;
            }
            
            // ============================================================
            // PROCESS PAYLOAD
            // ============================================================
            if (payloadType === 'gist' && gistId && gistId.length > 0) {
              console.log('Downloading data from Gist:', gistId);
              
              const token = process.env.GITHUB_TOKEN;
              if (!token) {
                console.error('GITHUB_TOKEN not found');
                process.exit(1);
              }
              
              const gistUrl = 'https://api.github.com/gists/' + gistId;
              
              fetch(gistUrl, {
                headers: {
                  'Authorization': 'token ' + token,
                  'Accept': 'application/vnd.github.v3+json',
                  'User-Agent': 'BPO-Workflow'
                }
              })
              .then(function(response) {
                if (!response.ok) {
                  throw new Error('Gist API returned ' + response.status);
                }
                return response.json();
              })
              .then(function(gistData) {
                const files = gistData.files;
                const fileNames = Object.keys(files);
                if (fileNames.length === 0) {
                  throw new Error('No files found in gist');
                }
                
                const fileContent = files[fileNames[0]].content;
                console.log('Downloaded data length:', fileContent.length);
                const diffData = JSON.parse(fileContent);
                console.log('Diff parsed successfully');
                
                const isFullData = diffData.scenarios && Array.isArray(diffData.scenarios);
                const success = processAndSave(diffData, isFullData);
                
                if (!success) {
                  process.exit(1);
                }
                
                if (token && gistId) {
                  console.log('Deleting temporary Gist...');
                  return fetch('https://api.github.com/gists/' + gistId, {
                    method: 'DELETE',
                    headers: {
                      'Authorization': 'token ' + token,
                      'Accept': 'application/vnd.github.v3+json'
                    }
                  });
                }
              })
              .then(function() {
                console.log('Gist deleted');
              })
              .catch(function(e) {
                console.error('Failed to process gist:', e.message);
                process.exit(1);
              });
              
              setTimeout(function() {}, 30000);
              
            } else {
              console.log('Processing direct payload...');
              let payloadData = payload.data || '';
              console.log('Payload data length:', payloadData.length);
              
              if (payloadData && payloadData.length > 0) {
                try {
                  const parsedData = JSON.parse(payloadData);
                  console.log('Payload parsed successfully');
                  console.log('Parsed data keys:', Object.keys(parsedData));
                  
                  const isFullData = parsedData.scenarios && Array.isArray(parsedData.scenarios);
                  const success = processAndSave(parsedData, isFullData);
                  
                  if (!success) {
                    process.exit(1);
                  }
                } catch (e) {
                  console.error('Failed to parse payload data:', e.message);
                  console.log('Payload data preview:', payloadData.substring(0, 200));
                  process.exit(1);
                }
              } else {
                console.error('No data found in payload');
                process.exit(1);
              }
            }
          "

      - name: Validate JSON
        run: |
          if [ -f data.json ] && [ -s data.json ]; then
            if ! jq empty data.json 2>/dev/null; then
              echo "Invalid JSON in data.json"
              cat data.json | head -100
              exit 1
            fi
            echo "JSON validation passed"
          fi

      - name: Commit and push
        run: |
          if [ -f data.json ] && git diff --quiet data.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Apply changes from web [skip ci]" || echo "No changes to commit"
            git push
          fi
