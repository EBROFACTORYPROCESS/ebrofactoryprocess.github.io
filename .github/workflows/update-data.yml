name: Update data.json from web

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install jsondiffpatch lz-string

      - name: Process and apply changes
        run: |
          node -e "
            const fs = require('fs');
            const jsondiffpatch = require('jsondiffpatch');
            const LZString = require('lz-string');
            
            // Read current data.json
            let currentData = {};
            try {
              const content = fs.readFileSync('data.json', 'utf8');
              currentData = JSON.parse(content);
            } catch (e) {
              console.log('No existing data.json, creating new one');
            }
            
            const payloadType = '${{ github.event.client_payload.type }}';
            const compression = '${{ github.event.client_payload.compression }}';
            let newData = null;
            
            // Handle chunked payloads
            if (payloadType === 'chunked') {
              const chunkIndex = parseInt('${{ github.event.client_payload.chunk_index }}');
              const totalChunks = parseInt('${{ github.event.client_payload.total_chunks }}');
              const chunkData = '${{ github.event.client_payload.chunk_data }}';
              
              // Store chunk in temporary file
              const chunkFile = `chunk_\${chunkIndex}.json`;
              fs.writeFileSync(chunkFile, chunkData);
              
              // If this is the first chunk, initialize the combined file
              if (chunkIndex === 0) {
                fs.writeFileSync('combined_chunks.json', chunkData);
              } else {
                // Append to existing combined file
                const existing = fs.readFileSync('combined_chunks.json', 'utf8');
                // Remove trailing '}' or ']' and combine
                let combined = existing.slice(0, -1) + ',' + chunkData.slice(1);
                fs.writeFileSync('combined_chunks.json', combined);
              }
              
              // If last chunk, process the combined data
              if (chunkIndex === totalChunks - 1) {
                const fullData = fs.readFileSync('combined_chunks.json', 'utf8');
                
                // Decompress if needed
                let decompressed = fullData;
                if (compression === 'lzstring') {
                  decompressed = LZString.decompressFromEncodedURIComponent(fullData);
                  if (!decompressed) {
                    console.error('Failed to decompress chunked data');
                    process.exit(1);
                  }
                }
                
                try {
                  const parsed = JSON.parse(decompressed);
                  newData = jsondiffpatch.patch(currentData, parsed);
                } catch (e) {
                  console.error('Failed to apply chunked diff:', e);
                  process.exit(1);
                }
                
                // Clean up temp files
                for (let i = 0; i < totalChunks; i++) {
                  try { fs.unlinkSync(`chunk_\${i}.json`); } catch(e) {}
                }
                try { fs.unlinkSync('combined_chunks.json'); } catch(e) {}
              } else {
                console.log(`✅ Chunk \${chunkIndex+1}/\${totalChunks} received`);
                process.exit(0); // Exit early, wait for next chunk
              }
            } 
            // Handle single payload (compressed or plain)
            else {
              let payloadData = '${{ github.event.client_payload.data }}';
              
              // Decompress if needed
              if (compression === 'lzstring') {
                payloadData = LZString.decompressFromEncodedURIComponent(payloadData);
                if (!payloadData) {
                  console.error('Failed to decompress data');
                  process.exit(1);
                }
              }
              
              const parsed = JSON.parse(payloadData);
              
              if (payloadType === 'diff' || payloadType === 'compressed-diff') {
                newData = jsondiffpatch.patch(currentData, parsed);
              } else {
                // Fallback: direct replacement
                newData = parsed;
              }
            }
            
            // Write the updated data
            if (newData) {
              fs.writeFileSync('data.json', JSON.stringify(newData, null, 2));
              console.log('✅ data.json updated successfully');
            } else {
              console.log('⚠️ No data to write, waiting for more chunks');
            }
          "

      - name: Validate JSON (if data.json was updated)
        run: |
          if [ -f data.json ] && [ -s data.json ]; then
            if ! jq empty data.json 2>/dev/null; then
              echo "❌ Invalid JSON in data.json"
              cat data.json
              exit 1
            fi
            echo "✅ JSON validation passed"
          fi

      - name: Commit and push (if data changed)
        run: |
          if [ -f data.json ] && git diff --quiet data.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Apply changes from web [skip ci]" || echo "No changes to commit"
            git push
          fi
          git commit -m "Apply changes from web [skip ci]" || echo "No changes to commit"
          git push
